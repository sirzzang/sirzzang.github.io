<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">왼쪽은 쿠버네티스 코어 기능으로 etcd에 저장된 Secret을 kubelet이 파드에 마운트하는 경로, 오른쪽은 애드온인 CSI 드라이버가 클러스터 외부 AWS Secrets Manager에서 값을 가져와 마운트하는 경로</desc>
