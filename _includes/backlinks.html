{% assign current_backlinks = site.data.backlinks[page.url] %}
{% if current_backlinks and current_backlinks.size > 0 %}
<br>
<div class="page__backlinks">
  <h4 class="page__backlinks-title"><i class="fas fa-link" aria-hidden="true"></i> 이 글을 참조하는 글</h4>
  <ul class="page__backlinks-list">
    {% for bl in current_backlinks %}
    <li><a href="{{ bl.url }}">{{ bl.title }}</a></li>
    {% endfor %}
  </ul>
</div>
{% endif %}
